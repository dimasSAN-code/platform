<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Barang</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">

    <div class="max-w-lg mx-auto bg-white p-6 rounded-xl shadow-lg">

        <h1 class="text-2xl font-bold mb-5 text-center">Tambah Barang</h1>

        <form id="formBarang">

            <label class="block mb-2 font-semibold">Nama Barang</label>
            <input 
                type="text" 
                id="nama_barang" 
                required
                class="w-full border p-2 rounded mb-4"
            >

            <label class="block mb-2 font-semibold">Harga</label>
            <input 
                type="number" 
                id="harga" 
                required
                class="w-full border p-2 rounded mb-4"
            >

            <div class="flex gap-3">
                <button 
                    type="submit" 
                    class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded"
                >
                    Simpan
                </button>

                <a 
                    href="index.html" 
                    class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded"
                >
                    Kembali
                </a>
            </div>

        </form>

    </div>

    <script src="tambah.js"></script>

</body>
</html>
