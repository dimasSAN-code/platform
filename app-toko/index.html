<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Daftar Barang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
</head>

<body class="bg-gray-100 p-8">

    <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg p-6">

        <h1 class="text-2xl font-bold mb-4">Daftar Barang</h1>

        <form id="formBarang" class="mb-6 flex gap-2">
            <input type="text" id="nama_barang" placeholder="Nama Barang" class="border p-2 rounded w-full" required>

            <input type="number" id="harga" placeholder="Harga" class="border p-2 rounded w-full" required>

            <button type="submit" class="bg-blue-500 text-white px-4 rounded">
                Simpan
            </button>
        </form>

        <table class="w-full border border-gray-200">
            <thead class="bg-blue-500 text-white">
                <tr>
                    <th class="p-2">ID</th>
                    <th class="p-2">Nama Barang</th>
                    <th class="p-2 text-right">Harga</th>
                </tr>
            </thead>

            <tbody id="tabel-barang" class="text-center">
            </tbody>
        </table>

    </div>

    <script src="app.js"></script>
</body>

</html>
